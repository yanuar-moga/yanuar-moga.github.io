<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Download Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#4f46e5;
--secondary:#7c3aed;
--success:#16a34a;
--danger:#ef4444;
--shadow:0 8px 30px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(
135deg,
#eef2ff 0%,
#f5f3ff 50%,
#ede9fe 100%
);
}

.container{
width:100%;
max-width:650px;
}

.card{
background:white;
border-radius:24px;
padding:35px;
box-shadow:var(--shadow);
animation:fadeUp .7s ease;
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:40px;
font-weight:bold;
animation:pulse 2s infinite;
}

h1{
text-align:center;
margin-top:20px;
margin-bottom:10px;
font-size:28px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:6px;
}

input,
textarea,
select{
width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
transition:.3s;
}

input:focus,
textarea:focus,
select:focus{
border-color:#7c3aed;
box-shadow:0 0 0 4px rgba(124,58,237,.12);
}

button{
border:none;
cursor:pointer;
}

.submit-btn{
width:100%;
padding:15px;
border-radius:14px;
font-size:16px;
font-weight:600;
color:white;
background:
linear-gradient(
135deg,
#4f46e5,
#7c3aed
);
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
}

.success-box{
display:none;
text-align:center;
}

.token-box{
margin-top:15px;
}

.download-btn{
margin-top:20px;
width:100%;
padding:16px;
background:#16a34a;
color:white;
font-size:18px;
font-weight:700;
border-radius:15px;
}

.download-btn:hover{
transform:scale(1.02);
}

.contact-btn{
display:block;
text-decoration:none;
padding:14px;
border-radius:12px;
color:white;
margin-top:12px;
font-weight:600;
}

.wa{
background:#25D366;
}

.tt{
background:#000;
}

.loading{
position:fixed;
inset:0;
background:rgba(255,255,255,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
backdrop-filter:blur(6px);
z-index:999;
}

.spinner{
width:60px;
height:60px;
border:5px solid #ddd;
border-top:5px solid #4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
}

.loading p{
margin-top:15px;
font-weight:600;
}

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#111827;
color:white;
padding:12px 20px;
border-radius:12px;
display:none;
z-index:9999;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:none;
}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">🔒</div>

<h1>Secure Download Gateway</h1>

<p class="subtitle">
Silakan lengkapi data untuk mengakses berkas.
</p>

<form id="leadForm">

<div class="form-group">
<label>Nama</label>
<input type="text" id="nama" required>
</div>

<div class="form-group">
<label>Alamat</label>
<input type="text" id="alamat">
</div>

<div class="form-group">
<label>No HP</label>
<input type="text" id="nohp" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Alasan</label>
<textarea id="alasan"></textarea>
</div>

<div class="form-group">
<label>Pilih File</label>
<select id="fileSelect">
<option>Memuat data...</option>
</select>
</div>

<button class="submit-btn">
Lanjutkan
</button>

</form>

<div class="success-box" id="successBox"></div>

</div>

</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Menyimpan data & memvalidasi keamanan...</p>
</div>

<div class="toast" id="toast"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzVrpnznLAHNgc5mY_BWcgjkGXJSGzcQovzzUDHwVf5X0rWpipS3UA6In72fxOeUYXw/exec";

let selectedFile="";
let currentToken="";
let ipInfo={};

const form=document.getElementById("leadForm");
const select=document.getElementById("fileSelect");

async function loadFiles(){

try{

const res=await fetch(API_URL);
const data=await res.json();

select.innerHTML="";

data.files.forEach(file=>{

const option=document.createElement("option");

option.value=file.name;

let text=file.name;

if(file.status==="GRATIS"){
text+=" (GRATIS)";
}else{
text+=" (Rp "+Number(file.price).toLocaleString()+")";
}

option.textContent=text;

option.dataset.status=file.status;

select.appendChild(option);

});

}catch(err){

showToast("Gagal memuat data");

}

}

async function loadIP(){

try{

const res=await fetch("https://ipapi.co/json/");
ipInfo=await res.json();

}catch(e){}

}

function showLoading(show=true){
document.getElementById("loading").style.display=
show?"flex":"none";
}

function showToast(text){

const t=document.getElementById("toast");

t.innerText=text;
t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},3000);

}

form.addEventListener("submit",async(e)=>{

e.preventDefault();

showLoading(true);

selectedFile=select.value;

const payload={

nama:nama.value,
alamat:alamat.value,
nohp:nohp.value,
email:email.value,
alasan:alasan.value,
filePilihan:selectedFile,

ip:ipInfo.ip||"",
isp:ipInfo.org||"",
os:navigator.platform,
browser:navigator.userAgent,
userAgent:navigator.userAgent

};

try{

const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

const data=await res.json();

showLoading(false);

form.style.display="none";

const box=document.getElementById("successBox");

if(data.type==="GRATIS"){

currentToken=data.token;

box.innerHTML=`

<h2>Terima Kasih</h2>

<p style="margin-top:10px">
Token akses Anda:
</p>

<div class="token-box">
<input value="${data.token}" readonly>
</div>

<button
class="download-btn"
onclick="downloadFile()"
>
UNDUH BERKAS SEKARANG
</button>

`;

}else{

box.innerHTML=`

<h2>File Premium</h2>

<p style="margin-top:15px">
Token akses tersedia melalui admin.
</p>

<a
class="contact-btn wa"
href="https://wa.me/6285229399579"
target="_blank"
>
WhatsApp Admin
</a>

<a
class="contact-btn tt"
href="https://tiktok.com/@yanuar_moga"
target="_blank"
>
TikTok Admin
</a>

`;

}

box.style.display="block";

}catch(err){

showLoading(false);
showToast("Terjadi kesalahan");

}

});

async function downloadFile(){

showLoading(true);

try{

const res=await fetch(
`${API_URL}?file=${encodeURIComponent(selectedFile)}&token=${encodeURIComponent(currentToken)}`
);

const data=await res.json();

showLoading(false);

if(data.success){

window.location.href=
data.downloadUrl;

}else{

showToast(data.error);

}

}catch(err){

showLoading(false);

showToast("Gagal download");

}

}

loadFiles();
loadIP();

</script>

</body>
</html>
