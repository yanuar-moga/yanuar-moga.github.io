<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Download Materi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow-x:hidden;

}

.card{

width:100%;
max-width:520px;

background:
rgba(255,255,255,.12);

backdrop-filter:
blur(16px);

border:
1px solid rgba(255,255,255,.2);

border-radius:24px;

padding:30px;

box-shadow:
0 15px 35px rgba(0,0,0,.25);

animation:
fadeIn .7s ease;

}

.logo{

width:90px;
height:90px;

border-radius:50%;

display:block;
margin:auto;

object-fit:cover;

border:4px solid white;

box-shadow:
0 5px 20px rgba(0,0,0,.3);

animation:
float 4s ease-in-out infinite;

}

h1{

margin-top:20px;

text-align:center;

color:white;

font-size:28px;

}

.subtitle{

margin-top:10px;

text-align:center;

color:#e2e8f0;

line-height:1.6;

font-size:14px;

}

.notice{

margin-top:20px;

background:
rgba(255,255,255,.1);

padding:15px;

border-radius:12px;

color:white;

font-size:14px;

line-height:1.8;

}

form{

margin-top:20px;

}

input,
textarea,
select{

width:100%;

padding:14px;

border:none;

border-radius:12px;

margin-bottom:14px;

font-size:15px;

outline:none;

}

textarea{

min-height:90px;

resize:vertical;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:.3s;

}

.primary{

background:#22c55e;
color:white;

}

.primary:hover{

transform:translateY(-2px);

}

.verify{

background:#f59e0b;
color:white;

margin-top:10px;

}

.verify:hover{

transform:translateY(-2px);

}

.checkbox{

display:flex;
gap:10px;

color:white;

font-size:13px;

margin-bottom:12px;

}

.checkbox input{

width:auto;

margin-top:4px;

}

.hidden{

display:none;

}

#message{

margin-top:15px;

text-align:center;

font-weight:bold;

color:white;

}

.success{

margin-top:20px;

padding-top:20px;

border-top:
1px solid rgba(255,255,255,.2);

}

.success h3{

color:white;

margin-bottom:10px;

}

.success p{

color:#e2e8f0;

margin-bottom:15px;

}

.contact{

display:flex;
gap:10px;

margin-bottom:15px;

}

.contact a{

flex:1;

padding:12px;

text-align:center;

text-decoration:none;

border-radius:10px;

font-weight:bold;

color:white;

}

.wa{

background:#16a34a;

}

.tt{

background:#000;

}

.loading{

display:none;

text-align:center;

color:white;

margin-top:15px;

}

.spinner{

width:28px;
height:28px;

border:4px solid rgba(255,255,255,.3);
border-top:4px solid white;

border-radius:50%;

margin:auto;

animation:
spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

@media(max-width:600px){

.card{
padding:22px;
}

.contact{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="card">

<img
src="https://yanuar-moga.github.io/assets/logo.jpg"
class="logo">

<h1>Download Materi</h1>

<p class="subtitle">

Silakan isi data berikut untuk mendapatkan akses download.

</p>

<div class="notice">

✅ 1 Biodata = 1 Download<br>
✅ Token wajib dari Admin<br>
✅ Aktivitas download tercatat

</div>

<form id="registerForm">

<input
id="nama"
placeholder="Nama Lengkap"
required>

<textarea
id="alamat"
placeholder="Alamat Lengkap"
required></textarea>

<input
id="hp"
placeholder="Nomor HP"
required>

<input
id="email"
type="email"
placeholder="Email"
required>

<input
id="jabatan"
placeholder="Jabatan"
required>

<select
id="alasan"
required>

<option value="">
Pilih Alasan Download
</option>

<option>
Belajar pribadi
</option>

<option>
Mengajar
</option>

<option>
Referensi
</option>

<option>
Lainnya
</option>

</select>

<select
id="fileId"
required>

<option value="">
Pilih File
</option>

<option value="file1">
Modul AI Dasar
</option>

<option value="file2">
Ebook Prompting
</option>

<option value="file3">
Template RPP
</option>

</select>

<label class="checkbox">

<input
type="checkbox"
required>

<span>
Saya menyatakan data yang saya isi benar.
</span>

</label>

<label class="checkbox">

<input
type="checkbox"
required>

<span>
Saya memahami akses download hanya diberikan satu kali.
</span>

</label>

<button
type="submit"
class="primary">

DAFTAR SEKARANG

</button>

</form>

<div
class="loading"
id="loading">

<div class="spinner"></div>

<p>Memproses...</p>

</div>

<div
id="successBox"
class="success hidden">

<h3>

Data berhasil disimpan

</h3>

<p>

Hubungi admin untuk mendapatkan token akses.

</p>

<div class="contact">

<a
class="wa"
href="https://wa.me/6285229399579"
target="_blank">

WhatsApp

</a>

<a
class="tt"
href="https://www.tiktok.com/@yanuar_moga"
target="_blank">

TikTok

</a>

</div>

<input
id="token"
placeholder="Masukkan Token">

<button
id="verifyBtn"
class="verify">

VERIFIKASI TOKEN

</button>

</div>

<div id="message"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxJLSxa9PHJyfFyOwXQVx7B5TZ4keywRWhjjd2KI5iA3SCIJdrAxBX_4URsQ1UfaVHNyA/exec";

let currentUserId="";

async function getDeviceInfo(){

let ip="";
let isp="";

try{

const r=
await fetch(
"https://ipapi.co/json/"
);

const d=
await r.json();

ip=d.ip||"";
isp=d.org||"";

}catch(e){}

const ua=
navigator.userAgent;

let browser="Unknown";

if(ua.includes("Chrome"))
browser="Chrome";

if(ua.includes("Firefox"))
browser="Firefox";

if(
ua.includes("Safari")
&&!ua.includes("Chrome")
)
browser="Safari";

let os="Unknown";

if(ua.includes("Android"))
os="Android";

if(ua.includes("iPhone"))
os="iPhone";

if(ua.includes("Windows"))
os="Windows";

if(ua.includes("Mac"))
os="MacOS";

let device="Desktop";

if(
/Android|iPhone|iPad/i.test(ua)
)
device="Mobile";

return{
ip,
isp,
browser,
os,
device,
userAgent:ua
};

}

registerForm.addEventListener(
"submit",
async function(e){

e.preventDefault();

loading.style.display="block";

const info=
await getDeviceInfo();

const payload={

action:"register",

nama:nama.value,
alamat:alamat.value,
hp:hp.value,
email:email.value,
jabatan:jabatan.value,
alasan:alasan.value,
fileId:fileId.value,

ip:info.ip,
isp:info.isp,
browser:info.browser,
os:info.os,
device:info.device,
userAgent:info.userAgent

};

try{

const res=
await fetch(API_URL,{

method:"POST",

body:
JSON.stringify(payload)

});

const data=
await res.json();

loading.style.display="none";

if(data.success){

currentUserId=
data.userId;

registerForm.style.display="none";

successBox.classList.remove(
"hidden"
);

message.innerHTML=
"Registrasi berhasil.";

}else{

message.innerHTML=
data.message;

}

}catch(err){

loading.style.display="none";

message.innerHTML=
"Gagal menghubungi server.";

}

});

verifyBtn.addEventListener(
"click",
async function(){

const token=
document
.getElementById("token")
.value;

const res=
await fetch(API_URL,{

method:"POST",

body:
JSON.stringify({

action:"verify",

userId:
currentUserId,

token:token

})

});

const data=
await res.json();

if(data.success){

window.location=
data.downloadUrl;

}else{

alert(data.message);

}

});

</script>

</body>
</html>
