<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Digital Portal Secure Gateway</title>
    <style>
        :root {
            --primary-color: #1f497d;
            --primary-hover: #16355a;
            --success-color: #28a745;
            --text-color: #2c3e50;
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 1. Background Gradasi Biru Muda ke Putih dengan Animasi Halus */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 50%, #ffffff 100%);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Container Form dengan Efek Rounded Corner & Soft Shadow Elegan */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(31, 73, 125, 0.08), 0 5px 15px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 520px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            animation: formAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes formAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header-area {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Logo Bulat dengan Animasi Bernapas (Pulse) */
        .logo {
            max-width: 90px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(31, 73, 125, 0.15);
            animation: logoPulse 3s ease-in-out infinite;
            border: 3px solid #fff;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); box-shadow: 0 12px 25px rgba(31, 73, 125, 0.25); }
            100% { transform: scale(1); }
        }

        h2 {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 22px;
            opacity: 0;
            transform: translateX(-15px);
            animation: slideIn 0.5s ease forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.3s; }
        .form-group:nth-child(3) { animation-delay: 0.4s; }
        .form-group:nth-child(4) { animation-delay: 0.5s; }
        .form-group:nth-child(5) { animation-delay: 0.6s; }
        .form-group:nth-child(6) { animation-delay: 0.7s; }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13.5px;
            color: #475569;
        }

        input, select {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #334155;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(31, 73, 125, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(31, 73, 125, 0.2);
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(31, 73, 125, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .loading-area {
            display: none;
            text-align: center;
            margin-top: 25px;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.05);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 600;
        }

        .success-box {
            text-align: center;
            padding: 20px 10px;
            animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-download {
            display: inline-block;
            padding: 14px 35px;
            background-color: var(--success-color);
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(40, 167, 69, 0.3);
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-download:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(40, 167, 69, 0.4);
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 30px 20px; border-radius: 16px; }
            h2 { font-size: 21px; }
            input, select, button { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="https://yanuar-moga.github.io/assets/logo.jpg" alt="Logo" class="logo">
        <h2>Formulir Akses Download</h2>
        <p class="subtitle">Lengkapi berkas identitas Anda secara valid untuk mengunci token enkripsi file digital.</p>
    </div>

    <form id="downloadForm">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda" required>
        </div>
        
        <div class="form-group">
            <label for="alamat">Alamat Kelurahan / Kota</label>
            <input type="text" id="alamat" placeholder="Contoh: Moga, Pemalang" required>
        </div>
        
        <div class="form-group">
            <label for="no_hp">Nomor HP / WhatsApp</label>
            <input type="tel" id="no_hp" placeholder="Contoh: 081234567xxx" required>
        </div>
        
        <div class="form-group">
            <label for="email">Alamat Email Aktif</label>
            <input type="email" id="email" placeholder="nama@email.com" required>
        </div>
        
        <div class="form-group">
            <label for="alasan">Alasan Mengunduh Berkas</label>
            <select id="alasan" required>
                <option value="">-- Pilih Alasan --</option>
                <option value="Belajar Mandiri">Belajar Mandiri</option>
                <option value="Mengajar">Mengajar</option>
                <option value="Referensi">Referensi</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="file_pilihan">Pilih Berkas File</label>
            <select id="file_pilihan" required>
                <option value="">Menghubungkan ke database...</option>
            </select>
        </div>
        
        <button type="submit" id="btnSubmit">Verifikasi Data & Ambil Berkas</button>
    </form>

    <div class="loading-area" id="loadingArea">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Mengunci data dan menyiapkan token keamanan...</div>
    </div>
</div>

<script>
    // Diberikan parameter anti-cache '?v=1' di akhir agar file HTML baru mengenali sistem modifikasi skrip terpusat Anda.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbX5gzQTrE3ZNchDlfUko3m_hjh0sf-osVHTKt-JE3O_-ZCEpFP6CZz3OPgsEPaOgFKzrQ/exec"; 
    let geoData = { ip: "-", isp: "-" };

    // Ambil IP dan ISP Pengunjung
    async function fetchGeoLocation() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            geoData.ip = data.ip || "-";
            geoData.isp = data.org || "-";
        } catch (err) {
            console.log("Deteksi IP dilewati/terblokir adblocker.");
        }
    }

    // Analisis Browser Pengunjung
    function parseClientBrowser() {
        const ua = navigator.userAgent;
        let browser = "Browser Lainnya";
        let os = "OS Lainnya";

        if (ua.includes("Firefox")) browser = "Mozilla Firefox";
        else if (ua.includes("SamsungBrowser")) browser = "Samsung Browser";
        else if (ua.includes("Chrome") && !ua.includes("Chromium")) browser = "Google Chrome";
        else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Apple Safari";
        else if (ua.includes("Edge")) browser = "Microsoft Edge";

        if (ua.includes("Windows")) os = "Windows";
        else if (ua.includes("Android")) os = "Android";
        else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
        else if (ua.includes("Macintosh")) os = "MacOS";

        const isMobile = /Mobi|Android/i.test(ua) ? "Mobile" : "Desktop";
        return { device_os: `${isMobile} (${os})`, browser: browser, user_agent: ua };
    }

    // Solusi CORS Utama: Mengambil data nama-nama file dari Google Sheet
    async function loadDropdownFiles() {
        try {
            // Ditambahkan cache-buster (?v=) khusus pada saat GET agar dropdown tidak tertahan cache browser lama
            const response = await fetch(GAS_URL + "?nocache=" + new Date().getTime(), { method: 'GET', redirect: 'follow' });
            const rawText = await response.text(); 
            const data = JSON.parse(rawText);      
            
            const selectElement = document.getElementById('file_pilihan');
            
            if(data.files && data.files.length > 0) {
                selectElement.innerHTML = '<option value="">-- Pilih Berkas File --</option>';
                data.files.forEach(file => {
                    let option = document.createElement('option');
                    option.value = file;
                    option.textContent = file;
                    selectElement.appendChild(option);
                });
            } else {
                selectElement.innerHTML = '<option value="">Tidak ada berkas file di Kolom A Sheet Files</option>';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('file_pilihan').innerHTML = '<option value="">⚠️ Gagal memuat! Pastikan Web App GAS sudah di-Deploy sebagai "Anyone"</option>';
        }
    }

    // Proses Submit Form & Pembuatan Gateway Link Unduhan
    document.getElementById('downloadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('loadingArea');
        const form = document.getElementById('downloadForm');
        
        btn.disabled = true;
        loader.style.display = 'block';
        
        const clientInfo = parseClientBrowser();
        const payload = {
            nama: document.getElementById('nama').value,
            alamat: document.getElementById('alamat').value,
            no_hp: document.getElementById('no_hp').value,
            email: document.getElementById('email').value,
            alasan: document.getElementById('alasan').value,
            file_pilihan: document.getElementById('file_pilihan').value,
            ip: geoData.ip,
            isp: geoData.isp,
            device_os: clientInfo.device_os,
            browser: clientInfo.browser,
            user_agent: clientInfo.user_agent
        };

        try {
            // Mengirim data leads via POST ke Google Sheets
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('loadingText').textContent = "Sinkronisasi Berhasil! Merakit tautan aman...";
            
            setTimeout(function() {
                form.style.display = 'none';
                loader.style.display = 'none';
                
                const fileSelectedName = encodeURIComponent(payload.file_pilihan);
                const container = document.querySelector('.container');
                const successDiv = document.createElement('div');
                successDiv.className = 'success-box';
                
                // Menambahkan kalimat navigasi yang informatif terkait "Notifikasi Pengalihan Google"
                successDiv.innerHTML = `
                    <h3 style="color:var(--success-color); margin-bottom:12px; font-size:22px;">Verifikasi Sukses!</h3>
                    <p style="font-size:14.5px; color:#475569; margin-bottom:20px; line-height:1.5;">Tautan aman terenkripsi untuk file<br><strong style="color:#1e293b;">"${payload.file_pilihan}"</strong> telah siap.</p>
                    <a href="${GAS_URL}?file=${fileSelectedName}&token=BYPASS_AUTO" id="finalDownloadLink" target="_blank" class="btn-download">UNDUH BERKAS</a>
                    <p style="font-size:12px; color:#64748b; margin-top:25px; line-height: 1.5; background: #f1f5f9; padding: 10px; border-radius: 8px;">
                        <strong>PENTING:</strong> Jika Google menampilkan halaman <em>"Notifikasi Pengalihan"</em> setelah Anda klik tombol di atas, silakan <strong>klik tautan link biru</strong> yang muncul di layar tersebut untuk langsung memulai unduhan berkas Anda.
                    </p>
                `;
                container.appendChild(successDiv);
                
                document.getElementById('finalDownloadLink').addEventListener('click', function() {
                    setTimeout(() => { location.reload(); }, 4000);
                });
            }, 1500);

        } catch (error) {
            alert("Gagal terhubung ke server database.");
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });

    window.onload = async function() {
        await fetchGeoLocation();
        await loadDropdownFiles();
    };
</script>
</body>
</html>
