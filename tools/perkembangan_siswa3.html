<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Rapor Digital 7H</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .float-btn { position: fixed; bottom: 30px; z-index: 50; transition: all 0.3s; }
        .animate-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-5xl mx-auto">
    <div class="bg-blue-900 text-white p-8 rounded-3xl mb-8 shadow-2xl text-center">
        <h1 class="text-3xl font-extrabold">E-Rapor Digital SMPN 1 Moga</h1>
        <p class="text-blue-200">Kelas 7H - Analisis Perkembangan Siswa</p>
    </div>

    <div class="card p-8 bg-white rounded-3xl shadow-sm border mb-8 text-center animate-fade">
        <h2 class="text-xl font-bold mb-4">Pilih Data Excel Anda</h2>
        <input type="file" id="fileInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" accept=".xlsx">
    </div>

    <div id="mainContent" class="hidden animate-fade">
        <select id="selectSiswa" class="w-full p-4 mb-6 rounded-2xl border-2 border-blue-200 font-bold text-lg shadow-sm"></select>
        <div id="displayArea" class="space-y-6"></div>
    </div>
</div>

<button onclick="navigasi(-1)" class="float-btn left-10 bg-white p-4 rounded-full shadow-xl hover:bg-gray-100">◀ Sebelumnya</button>
<button onclick="navigasi(1)" class="float-btn right-10 bg-blue-600 text-white p-4 rounded-full shadow-xl hover:bg-blue-700">Selanjutnya ▶</button>

<script>
    let d1, d2, dCatatan;
    const mapels = ["Agama", "Pend. Pancasila", "B. Indonesia", "Matematika", "IPA", "IPS", "B. Inggris", "Prakarya", "PJOK", "Informatika", "B. Daerah"];

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type: 'array'});
            d1 = XLSX.utils.sheet_to_json(wb.Sheets["Semester1"], {header: 1});
            d2 = XLSX.utils.sheet_to_json(wb.Sheets["Semester2"], {header: 1});
            dCatatan = XLSX.utils.sheet_to_json(wb.Sheets["CatatanWaliKelas"], {header: 1});
            
            Swal.fire({ icon: 'success', title: 'Data Berhasil Dimuat!', text: 'Silakan pilih nama siswa.', showConfirmButton: false, timer: 1500 });
            document.getElementById('mainContent').classList.remove('hidden');
            const sel = document.getElementById('selectSiswa');
            d2.forEach((r, i) => { if(i > 0 && r[1]) sel.innerHTML += `<option value="${i}">${r[1]}</option>`; });
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function getCatatan(rank) {
        for(let i=1; i<dCatatan.length; i++) {
            let range = dCatatan[i][1].split('-');
            if (rank >= parseInt(range[0]) && rank <= parseInt(range[1])) return dCatatan[i][3];
        }
        return "Terus tingkatkan semangat belajarmu!";
    }

    document.getElementById('selectSiswa').addEventListener('change', (e) => {
        const i = e.target.value;
        const s2 = d2[i], s1 = d1[i];
        
        const nS2 = mapels.map((_, idx) => parseFloat(s2[idx+5]) || 0);
        const nS1 = mapels.map((_, idx) => parseFloat(s1[idx+5]) || 0);
        
        document.getElementById('displayArea').innerHTML = `
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-blue-600">
                    <h3 class="text-xs uppercase font-bold text-gray-400">Data Siswa</h3>
                    <p class="text-2xl font-bold">${s2[1]}</p>
                    <p class="text-sm">NIS: ${s2[4]} | NISN: ${s2[3]}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h3 class="text-xs uppercase font-bold text-gray-400">Peringkat S1</h3>
                    <p class="text-4xl font-extrabold text-blue-900">#${s1[2]}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h3 class="text-xs uppercase font-bold text-gray-400">Peringkat S2</h3>
                    <p class="text-4xl font-extrabold text-blue-600">#${s2[27]}</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <canvas id="chartMapel" height="80"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <h3 class="font-bold mb-4">Rekapitulasi Kehadiran & Ketuntasan</h3>
                <table class="w-full text-center border-collapse">
                    <tr class="bg-gray-50"><th class="p-2">Semester</th><th>S</th><th>I</th><th>A</th><th>Status</th></tr>
                    <tr><td class="p-2">S1</td><td>${s1[16]}</td><td>${s1[17]}</td><td>${s1[18]}</td><td>${s1[26]>=75?'Tuntas':'Remedial'}</td></tr>
                    <tr><td class="p-2">S2</td><td>${s2[16]}</td><td>${s2[17]}</td><td>${s2[18]}</td><td>${s2[26]>=75?'Tuntas':'Remedial'}</td></tr>
                </table>
            </div>

            <div class="bg-blue-900 text-white p-8 rounded-2xl shadow-2xl">
                <h3 class="font-bold text-lg mb-2">Catatan Wali Kelas:</h3>
                <p class="italic text-lg">"${getCatatan(s2[27])}"</p>
                <div class="mt-4 pt-4 border-t border-blue-700 flex justify-between">
                    <span>Sikap: <strong>${s2[28]}</strong></span>
                    <span>Kesimpulan: <strong>${s2[26]>=75 ? 'LAYAK NAIK KELAS' : 'PERLU EVALUASI'}</strong></span>
                </div>
            </div>
        `;

        new Chart(document.getElementById('chartMapel'), {
            type: 'bar',
            data: { labels: mapels, datasets: [
                { label: 'S1', data: nS1, backgroundColor: '#cbd5e1' },
                { label: 'S2', data: nS2, backgroundColor: '#2563eb' }
            ]},
            options: { plugins: { datalabels: { anchor: 'end', align: 'top', formatter: v => v } } }
        });
    });

    function navigasi(step) {
        const sel = document.getElementById('selectSiswa');
        if(sel.selectedIndex + step > 0 && sel.selectedIndex + step < sel.options.length) {
            sel.selectedIndex += step;
            sel.dispatchEvent(new Event('change'));
        }
    }
</script>
</body>
</html>
