<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rapor Digital Professional - SMPN 1 Moga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding-bottom: 80px; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .float-btn { position: fixed; bottom: 20px; z-index: 50; padding: 15px 25px; border-radius: 999px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

<!-- Floating Navigation -->
<button onclick="navigasi(-1)" class="float-btn left-5 bg-gray-700 text-white">◀ Prev</button>
<button onclick="navigasi(1)" class="float-btn right-5 bg-blue-600 text-white">Next ▶</button>

<div class="max-w-4xl mx-auto">
    <div class="bg-blue-900 p-8 rounded-3xl text-white text-center mb-6 shadow-2xl">
        <h1 class="text-2xl font-bold">Laporan Perkembangan Siswa 360°</h1>
        <p class="text-yellow-400">SMP NEGERI 1 MOGA - KELAS 7H</p>
    </div>

    <div class="card p-6 mb-6">
        <div class="grid grid-cols-2 gap-4">
            <input type="file" id="fileS1" class="p-2 border rounded-xl" title="Semester 1">
            <input type="file" id="fileS2" class="p-2 border rounded-xl" title="Semester 2">
        </div>
        <select id="selectSiswa" class="w-full mt-4 p-4 bg-gray-100 rounded-2xl font-bold text-lg">
            <option value="">-- Pilih Nama Siswa --</option>
        </select>
    </div>

    <div id="displayArea" class="hidden space-y-6"></div>
</div>

<script>
    let dataS1 = [], dataS2 = [];
    Chart.register(ChartDataLabels);
    const mapelLabels = ["Agama", "Pancasila", "B. Indo", "Matematika", "IPA", "IPS", "B. Inggris", "Prakarya", "PJOK", "Informatika", "B. Daerah"];

    function process(e, type) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[Object.keys(wb.Sheets)[0]], {header: 1});
            if(type === 1) dataS1 = data; else { dataS2 = data; initDropdown(); }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function initDropdown() {
        const select = document.getElementById('selectSiswa');
        select.innerHTML = '<option value="">-- Pilih Nama Siswa --</option>';
        dataS2.forEach((row, i) => { if(i >= 7 && row[1]) { 
            let opt = document.createElement('option'); opt.value = i; opt.text = row[1]; select.appendChild(opt); 
        }});
    }

    function navigasi(step) {
        const select = document.getElementById('selectSiswa');
        let nextIndex = select.selectedIndex + step;
        if (nextIndex > 0 && nextIndex < select.options.length) {
            select.selectedIndex = nextIndex;
            select.dispatchEvent(new Event('change'));
        }
    }

    document.getElementById('selectSiswa').addEventListener('change', (e) => {
        if(!e.target.value) return;
        const s2 = dataS2[e.target.value];
        const s1 = dataS1.find(r => r && r[1] && r[1].trim() === s2[1].trim());
        
        const nilaiS2 = mapelLabels.map((_, i) => parseFloat(s2[i+4]) || 0);
        const nilaiS1 = s1 ? mapelLabels.map((_, i) => parseFloat(s1[i+5]) || 0) : mapelLabels.map(() => 0);
        
        const avgS2 = parseFloat(s2[21]);
        const avgS1 = parseFloat(s1 ? s1[28] : 0);
        const rankS2 = s2[22] || '-';
        const rankS1 = s1 ? s1[2] : '-';
        const isNaik = avgS2 >= 75;

        const display = document.getElementById('displayArea');
        display.classList.remove('hidden');

        display.innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-md text-center">
                <h2 class="text-3xl font-bold text-blue-900">${s2[1]}</h2>
                <div class="flex justify-center gap-6 mt-2 text-sm font-bold">
                    <span class="text-gray-500">Peringkat S1: <span class="text-blue-600">${rankS1}</span></span>
                    <span class="text-gray-500">Peringkat S2: <span class="text-blue-600">${rankS2}</span></span>
                </div>
            </div>

            <div class="card p-6"><canvas id="chartMapel" height="100"></canvas></div>
            
            <div class="card p-6 bg-gradient-to-r from-blue-700 to-blue-900 text-white">
                <h3 class="text-xl font-bold uppercase mb-2">${isNaik ? '✅ Status: NAIK KELAS' : '⚠️ Status: PERLU EVALUASI'}</h3>
                <p class="italic">"${isNaik ? 'Prestasi yang membanggakan!' : 'Jangan menyerah, mari tingkatkan belajar.'}"</p>
            </div>
        `;

        new Chart(document.getElementById('chartMapel'), {
            type: 'bar',
            data: { labels: mapelLabels, datasets: [{ label: 'S1', data: nilaiS1, backgroundColor: '#cbd5e1' }, { label: 'S2', data: nilaiS2, backgroundColor: '#1e40af' }] },
            options: { plugins: { datalabels: { anchor: 'end', align: 'top', font: { size: 9 } } }, scales: { y: { max: 100 } } }
        });
    });

    document.getElementById('fileS1').addEventListener('change', (e) => process(e, 1));
    document.getElementById('fileS2').addEventListener('change', (e) => process(e, 2));
</script>
</body>
</html>
