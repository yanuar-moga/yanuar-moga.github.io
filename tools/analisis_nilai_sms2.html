<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisis Nilai Siswa (Bab 1-9)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #f9fafc;
    margin: 0;
    padding: 20px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #2563eb;
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }
  header img {
    height: 50px;
    width: 50px;
    border-radius: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
  }
  header p {
    margin: 0;
    font-size: 12px;
    color: #e0e7ff;
  }
  section {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  select, input[type="number"], button, textarea {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin: 5px 0;
    font-size: 14px;
  }
  button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background: #1d4ed8;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
  }
  th {
    background: #f3f4f6;
  }
  .checkbox-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .bab-group {
    background: #f9fafc;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
  }
  .bab-group h4 {
    margin: 0 0 5px;
    color: #2563eb;
  }
  label {
    display: block;
    margin-left: 10px;
    font-size: 13px;
  }
  .tp-controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  textarea {
    width: 100%;
    height: 200px;
    margin-top: 10px;
    background: #f9fafc;
    font-family: monospace;
  }
</style>
</head>
<body>

<header>
  <img src="assets/logo.jpg" alt="Logo">
  <div>
    <h1>Analisis Nilai Siswa (Bab 1-9)</h1>
    <p>Versi 1.1 (Support Bab 1-9) Dev by MB</p>
  </div>
</header>

<section>
  <h3>Langkah 1: Upload File Excel</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx,.csv"><br>
  
  <h3>Langkah 2: Pilih Kelas</h3>
  <select id="sheetSelect"></select><br>

  <h3>Langkah 3: Atur KKM dan Pilih TP</h3>
  <label>KKM: <input type="number" id="kkm" value="78" min="0" max="100"></label>

  <div class="tp-controls">
    <button type="button" onclick="checkAll(true)">✔ Ceklis Semua</button>
    <button type="button" onclick="checkAll(false)">✖ Hapus Semua</button>
    <button type="button" onclick="checkTPPattern(1)">Hanya TP1</button>
    <button type="button" onclick="checkTPPattern(2)">TP1 & TP2</button>
  </div>

  <div id="tpCheckboxContainer" class="checkbox-container"></div>
  <button id="analyzeBtn" style="margin-top:20px; padding: 10px 20px; font-weight: bold;">Tampilkan Data</button>

  <h3>Hasil Rekap</h3>
  <div id="result"></div>
  <button id="downloadBtn" style="display:none; margin-top: 10px;">Download Excel Rekap</button>

  <h3>Daftar Nama untuk Dikirim ke WA</h3>
  <textarea id="waText" readonly placeholder="Daftar nama dan link asesmen akan muncul di sini..."></textarea>
</section>

<script>
let workbook, selectedSheetName;

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
  const reader = new FileReader();
  reader.onload = function(event) {
    const data = new Uint8Array(event.target.result);
    workbook = XLSX.read(data, { type: 'array' });
    const sheetSelect = document.getElementById('sheetSelect');
    sheetSelect.innerHTML = "";
    workbook.SheetNames.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      sheetSelect.appendChild(opt);
    });
    createTPCheckboxes();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
}

function createTPCheckboxes() {
  const container = document.getElementById("tpCheckboxContainer");
  container.innerHTML = "";
  // Update: Looping hingga Bab 9
  for (let bab = 1; bab <= 9; bab++) {
    const group = document.createElement("div");
    group.className = "bab-group";
    const title = document.createElement("h4");
    title.textContent = `BAB ${bab}`;
    group.appendChild(title);

    for (let tp = 1; tp <= 4; tp++) {
      const label = document.createElement("label");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = `BAB ${bab} TP ${tp}`;
      checkbox.checked = true;
      label.appendChild(checkbox);
      label.append(` TP ${tp}`);
      group.appendChild(label);
    }
    container.appendChild(group);
  }
}

function checkAll(state) {
  document.querySelectorAll("#tpCheckboxContainer input[type=checkbox]").forEach(cb => cb.checked = state);
}

function checkTPPattern(tpLimit) {
  document.querySelectorAll("#tpCheckboxContainer input[type=checkbox]").forEach(cb => {
    const tp = parseInt(cb.value.match(/TP (\d)/)[1]);
    cb.checked = tp <= tpLimit;
  });
}

document.getElementById('analyzeBtn').addEventListener('click', analyzeData);

function analyzeData() {
  if (!workbook) return alert("Silakan upload file excel terlebih dahulu!");
  
  selectedSheetName = document.getElementById("sheetSelect").value;
  const sheet = workbook.Sheets[selectedSheetName];
  const kkm = parseFloat(document.getElementById("kkm").value);
  const selectedTP = Array.from(document.querySelectorAll("#tpCheckboxContainer input:checked")).map(cb => cb.value);
  const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const results = [];
  const waMap = {};

  // Memproses data mulai dari baris 10 (index 9)
  for (let i = 9; i < data.length; i++) {
    const row = data[i];
    const nama = row[1]; // Kolom B
    if (!nama) continue;

    // Ambil 36 kolom nilai (9 Bab * 4 TP) mulai dari Kolom C (index 2)
    const nilaiTP = row.slice(2, 38); 
    const detail = {};
    const perbaikan = [];

    selectedTP.forEach(label => {
      const match = label.match(/BAB (\d) TP (\d)/);
      const bab = parseInt(match[1]);
      const tp = parseInt(match[2]);
      
      // Hitung posisi kolom: (Bab-1)*4 + (TP-1)
      const colIndex = (bab - 1) * 4 + (tp - 1);
      const nilai = parseFloat(nilaiTP[colIndex]);
      
      if (isNaN(nilai) || nilai < kkm) {
        detail[label] = nilai || "";
        perbaikan.push(label);
      }
    });

    if (perbaikan.length > 0) {
      results.push({ nama, ...detail });

      perbaikan.forEach(tpLabel => {
        const babNo = tpLabel.match(/BAB (\d)/)[1];
        const babName = `BAB ${babNo}`;
        
        // Link Perbaikan untuk Bab 1 - 9
        let link = "";
        const links = {
          "3": "https://look.short.gy/asesmenbab3",
          "4": "https://look.short.gy/asesmenbab4",
          "5": "https://look.short.gy/asesmenbab5",
          "6": "https://look.short.gy/asesmenbab6",
          "7": "https://look.short.gy/asesmenbab7",
          "8": "https://look.short.gy/asesmenbab8",
          "9": "https://look.short.gy/asesmenbab9"
        };
        
        link = links[babNo] || "Link belum tersedia";

        if (!waMap[nama]) waMap[nama] = new Set();
        waMap[nama].add(`${babName} → link perbaikan nilai: ${link}`);
      });
    }
  }

  // Generate Teks WhatsApp
  const sortedNames = Object.keys(waMap).sort((a, b) => a.localeCompare(b, "id"));
  let waText = "Berikut daftar siswa yang perlu mengulang asesmen:\n\n";
  
  sortedNames.forEach((nama, index) => {
    waText += `${index + 1}. ${nama.toUpperCase()}\n`;
    const list = Array.from(waMap[nama]);
    list.forEach(babText => {
      waText += `   - Mengulang ${babText}\n`;
    });
    waText += "\n";
  });

  if (sortedNames.length === 0) {
    waText = "Semua siswa sudah tuntas. 👍";
  }

  renderTable(results, selectedTP, kkm);
  document.getElementById("waText").value = waText.trim();
}

function renderTable(results, selectedTP, kkm) {
  const container = document.getElementById("result");
  if (results.length === 0) {
    container.innerHTML = "<p>Semua tuntas atau data tidak ditemukan.</p>";
    document.getElementById("downloadBtn").style.display = "none";
    return;
  }

  let html = "<table><thead><tr><th>Nama</th>";
  selectedTP.forEach(tp => html += `<th>${tp}</th>`);
  html += "</tr></thead><tbody>";

  results.forEach(r => {
    html += `<tr><td style="text-align:left">${r.nama}</td>`;
    selectedTP.forEach(tp => {
      const val = r[tp] ?? "";
      const isRed = val === "" || val < kkm;
      html += `<td style="color:${isRed ? 'red' : 'black'}">${val}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  
  container.innerHTML = html;
  document.getElementById("downloadBtn").style.display = "inline-block";
  document.getElementById("downloadBtn").onclick = () => downloadExcel(results, selectedTP);
}

function downloadExcel(results, selectedTP) {
  const data = [["Nama", ...selectedTP]];
  results.forEach(r => {
    data.push([r.nama, ...selectedTP.map(tp => r[tp] || "")]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Rekap_Remedial");
  XLSX.writeFile(wb, "rekap_nilai_remedial.xlsx");
}
</script>
</body>
</html>
