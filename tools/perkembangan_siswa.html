<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Rapor Digital - SMPN 1 Moga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .bg-smp { background: linear-gradient(135deg, #1d4ed8, #1e3a8a); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card-rounded { border-radius: 2rem; }
        .btn-gold { background: #fbbf24; transition: all 0.3s; }
        .btn-gold:hover { background: #d97706; transform: scale(1.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="bg-smp p-6 text-white rounded-t-3xl shadow-lg">
            <h1 class="text-2xl font-bold">Dashboard Rapor 7H</h1>
            <p class="text-yellow-300">Analisis Perbandingan Semester 1 & 2</p>
        </div>
        
        <div class="bg-white p-6 shadow-xl card-rounded border-b-8 border-yellow-400">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <input type="file" id="fileS1" class="p-2 border rounded-xl" placeholder="Upload S1">
                <input type="file" id="fileS2" class="p-2 border rounded-xl" placeholder="Upload S2">
            </div>
            
            <select id="selectSiswa" class="w-full p-4 bg-gray-100 rounded-2xl mb-6 font-semibold outline-none focus:ring-2 ring-blue-500">
                <option>-- Pilih Siswa --</option>
            </select>

            <div id="displayArea" class="hidden space-y-6">
                </div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="glass p-8 rounded-3xl text-center shadow-2xl max-w-sm transform transition-all scale-90">
            <h2 id="modalTitle" class="text-xl font-bold text-blue-800 mb-2">Info</h2>
            <p id="modalMsg" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="bg-blue-600 text-white px-6 py-2 rounded-full">Tutup</button>
        </div>
    </div>

    <script>
        let dataS1 = [], dataS2 = [];

        function showModal(title, msg) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('myModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('myModal').style.display = 'none'; }

        function processExcel(e, isS1) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, {type: 'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                if(isS1) dataS1 = data; else { dataS2 = data; initDropdown(); }
                showModal('Sukses', isS1 ? 'Data Semester 1 dimuat' : 'Data Semester 2 dimuat');
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function initDropdown() {
            const select = document.getElementById('selectSiswa');
            dataS2.forEach((row, index) => {
                if(index > 6 && row[1]) {
                    let opt = document.createElement('option');
                    opt.value = index; opt.text = row[1];
                    select.appendChild(opt);
                }
            });
        }

        document.getElementById('selectSiswa').addEventListener('change', (e) => {
            const idx = e.target.value;
            const s2 = dataS2[idx];
            const name = s2[1];
            const s1 = dataS1.find(r => r[1] === name);
            
            const r2 = s2[21] || 0;
            const r1 = s1 ? s1[22] : 0; // Sesuaikan index kolom rata-rata S1
            const tren = r2 >= r1 ? '📈 Meningkat' : '📉 Perlu Perhatian';

            document.getElementById('displayArea').classList.remove('hidden');
            document.getElementById('displayArea').innerHTML = `
                <div class="bg-blue-50 p-6 rounded-2xl border-l-8 border-blue-600">
                    <h2 class="text-2xl font-bold text-gray-800">${name}</h2>
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div class="p-4 bg-white rounded-xl shadow">Rata S1: ${parseFloat(r1).toFixed(1)}</div>
                        <div class="p-4 bg-white rounded-xl shadow">Rata S2: ${parseFloat(r2).toFixed(1)}</div>
                    </div>
                    <div class="mt-4 font-bold text-lg">${tren}</div>
                    <p class="mt-2 text-sm text-gray-600">${r2 >= r1 ? 'Pertahankan semangat belajar ananda.' : 'Mari tingkatkan fokus di semester depan.'}</p>
                </div>
            `;
        });

        document.getElementById('fileS1').addEventListener('change', (e) => processExcel(e, true));
        document.getElementById('fileS2').addEventListener('change', (e) => processExcel(e, false));
    </script>
</body>
</html>
