<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Rapor Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .nav-container { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 50; padding: 0 20px; }
        @media (max-width: 1024px) { .nav-container { position: static; margin-top: 30px; padding-bottom: 50px; } }
        .animate-card { animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-5xl mx-auto pb-20">
    <div class="bg-blue-900 text-white p-8 rounded-3xl mb-8 shadow-2xl text-center">
        <h1 class="text-3xl font-extrabold">E-Rapor Digital 7H</h1>
        <p class="text-blue-200">Laporan Komprehensif Semester 1 dan 2</p>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-sm border mb-8 text-center animate-card">
        <label class="block text-sm font-bold mb-2 text-blue-900">Upload File Excel Rapor:</label>
        <input type="file" id="fileInput" class="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" accept=".xlsx">
    </div>

    <div id="mainContent" class="hidden animate-card">
        <select id="selectSiswa" class="w-full p-4 mb-6 rounded-2xl border-2 border-blue-200 font-bold text-lg shadow-lg"></select>
        <div id="displayArea" class="space-y-6"></div>
    </div>
</div>

<div class="nav-container">
    <button onclick="navigasi(-1)" class="bg-white px-8 py-4 rounded-full shadow-xl hover:bg-gray-100 font-bold border">◀ Sebelumnya</button>
    <button onclick="navigasi(1)" class="bg-blue-600 text-white px-8 py-4 rounded-full shadow-xl hover:bg-blue-700 font-bold">Selanjutnya ▶</button>
</div>

<script>
    Chart.register(ChartDataLabels);
    let d1, d2, dCatatan;
    const mapels = ["Agama", "Pancasila", "B. Indo", "Matematika", "IPA", "IPS", "B.Inggris", "Prakarya", "PJOK", "Informatika", "B.Daerah"];

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type: 'array'});
            d1 = XLSX.utils.sheet_to_json(wb.Sheets["Semester1"], {header: 1});
            d2 = XLSX.utils.sheet_to_json(wb.Sheets["Semester2"], {header: 1});
            dCatatan = XLSX.utils.sheet_to_json(wb.Sheets["CatatanWaliKelas"], {header: 1});
            
            const sel = document.getElementById('selectSiswa');
            sel.innerHTML = '<option>-- Pilih Nama Siswa --</option>';
            d2.forEach((r, i) => { if(i > 0 && r[1]) sel.innerHTML += `<option value="${i}">${r[1]}</option>`; });
            
            Swal.fire({ title: 'Berhasil!', text: 'Data rapor siap digunakan.', icon: 'success', confirmButtonColor: '#1e3a8a' });
            document.getElementById('mainContent').classList.remove('hidden');
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function getSikap(p) {
        const desc = { 'A': 'Sangat Baik', 'B': 'Baik', 'C': 'Cukup', 'D': 'Kurang' };
        return `<strong>${desc[p] || 'Perlu Pendampingan'}</strong>. Artinya: Karakter dan kepribadian siswa selama di lingkungan sekolah dinilai ${desc[p] ? desc[p].toLowerCase() : 'perlu pendampingan'}.`;
    }

    document.getElementById('selectSiswa').addEventListener('change', (e) => {
        const i = e.target.value;
        const s2 = d2[i], s1 = d1[i];
        const isTuntas = s2[26] >= 75;
        
        document.getElementById('displayArea').innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-blue-600">
                <h2 class="text-2xl font-bold">${s2[1]}</h2>
                <p class="text-gray-600">NIS: ${s2[4]} | Rank: S1 (#${s1[2]}) / S2 (#${s2[27]})</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <canvas id="chartMapel" height="80"></canvas>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h3 class="font-bold mb-3 text-blue-900">Rekapitulasi Kehadiran</h3>
                    <table class="w-full text-center text-sm">
                        <tr class="bg-gray-100"><th>Semester</th><th>S</th><th>I</th><th>A</th></tr>
                        <tr><td>S1</td><td>${s1[16]}</td><td>${s1[17]}</td><td>${s1[18]}</td></tr>
                        <tr><td>S2</td><td>${s2[16]}</td><td>${s2[17]}</td><td>${s2[18]}</td></tr>
                    </table>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h3 class="font-bold mb-3 text-blue-900">Rata-rata & Status</h3>
                    <p>S1: ${parseFloat(s1[26]).toFixed(2)} | S2: ${parseFloat(s2[26]).toFixed(2)}</p>
                    <p class="font-bold text-lg ${isTuntas?'text-green-600':'text-red-600'}">Status: ${isTuntas?'TUNTAS':'BELUM TUNTAS'}</p>
                    ${isTuntas ? '<p class="text-blue-700 font-extrabold mt-1">>> Naik Ke Kelas VIII</p>' : ''}
                </div>
            </div>

            <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-xl">
                <h3 class="font-bold mb-2">Penilaian Sikap: ${s2[28]}</h3>
                <p class="mb-4">${getSikap(s2[28])}</p>
                <h3 class="font-bold border-t border-blue-700 pt-4">Saran untuk Orang Tua:</h3>
                <p class="italic text-blue-100">"${dCatatan.find(r=>r[0]==s2[28])?.[3] || 'Mari terus bersinergi demi masa depan ananda.'}"</p>
            </div>
        `;

        new Chart(document.getElementById('chartMapel'), {
            type: 'bar',
            data: { 
                labels: mapels, 
                datasets: [
                    { label: 'S1', data: mapels.map((_, idx) => parseFloat(s1[idx+5]) || 0), backgroundColor: '#cbd5e1' },
                    { label: 'S2', data: mapels.map((_, idx) => parseFloat(s2[idx+5]) || 0), backgroundColor: '#2563eb' }
                ]
            },
            options: {
                plugins: {
                    datalabels: { anchor: 'end', align: 'top', color: '#000000', font: { weight: 'bold', size: 11 } }
                }
            }
        });
    });

    function navigasi(step) {
        const sel = document.getElementById('selectSiswa');
        if(sel.selectedIndex + step > 0 && sel.selectedIndex + step < sel.options.length) {
            sel.selectedIndex += step;
            sel.dispatchEvent(new Event('change'));
        }
    }
</script>
</body>
</html>
