<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Laporan Kenaikan Kelas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* Styling CSS yang sudah teruji */
body { font-family: "Poppins", Arial, sans-serif; margin: 0; background: #f0f4f8; color: #222; }
header { background: linear-gradient(135deg, #1d72b8, #155a8a); color: white; text-align: center; padding: 20px 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
.container { max-width: 1400px; margin: 25px auto; padding: 20px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 12px rgba(0,0,0,.12); }
button { padding: 10px 16px; border: none; background: #1d72b8; color: #fff; border-radius: 6px; cursor: pointer; }
button:hover { background: #155a8a; }

#pdfArea { padding: 1.5cm; }
.kop { display: flex; align-items: center; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
.kop-text { width: 100%; text-align: center; line-height: 1.3; }
.judul { font-size: 16px; font-weight: bold; }

table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th, td { border: 1px solid #333; padding: 8px; vertical-align: top; word-wrap: break-word; }
th { background: #34495e; color: #fff; text-align: center; }
tr { page-break-inside: avoid; }

.badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; display: inline-block; color: #fff; }
.naik { background: #27ae60; }
.perlu { background: #e74c3c; }
</style>
</head>

<body>

<header>
  <h1>Aplikasi Laporan Kenaikan Kelas</h1>
  <p>Data Berdasarkan Leger Nilai Rapor Semester Genap 2025/2026</p>
</header>

<div class="container">
  <div class="card">
    <input type="file" id="excelFile">
    <button onclick="downloadPDF()">⬇ Download PDF</button>

    <div id="pdfArea">
      <div class="kop">
        <div class="kop-text">
          <div>PEMERINTAH KABUPATEN PEMALANG</div>
          <div>DINAS PENDIDIKAN DAN KEBUDAYAAN</div>
          <div class="judul">SMP NEGERI 1 MOGA</div>
          <div>LAPORAN HASIL BELAJAR & KEPUTUSAN KENAIKAN KELAS</div>
          <div class="alamat">Tahun Ajaran 2025/2026</div>
        </div>
      </div>
      <div id="hasil"></div>
    </div>
  </div>
</div>

<script>
// Fungsi logika penilaian (Dipertahankan)
function kategoriNilai(avg) {
  if (avg >= 85) return {t: "Sangat Baik", c: "good"};
  if (avg >= 75) return {t: "Baik", c: "mid"};
  return {t: "Perlu Pendampingan", c: "low"};
}

document.getElementById("excelFile").addEventListener("change", function(){
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type: "array"});
    const sh = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});

    let html = `<table>
    <tr>
      <th style="width:40px">No</th>
      <th>Nama Siswa</th>
      <th>Status Kenaikan</th>
      <th>Rata-rata</th>
      <th>Evaluasi Akademik</th>
      <th>Catatan Orang Tua</th>
    </tr>`;

    let no = 1;
    // Iterasi baris data dari Excel
    for(let i=7; i<=38; i++){
      if(!sh[i] || !sh[i][1]) continue;

      let nama = sh[i][1];
      let avg = parseFloat(sh[i][21]) || 0;
      let alpa = parseInt(sh[i][17]) || 0;
      
      // Logika Kenaikan Kelas
      let isNaik = (avg >= 75 && alpa < 5);
      
      html += `
      <tr>
        <td style="text-align:center">${no++}</td>
        <td><b>${nama}</b></td>
        <td><span class="badge ${isNaik ? 'naik' : 'perlu'}">${isNaik ? 'NAIK KELAS' : 'EVALUASI'}</span></td>
        <td>${avg.toFixed(1)}</td>
        <td>${isNaik ? 'Kompeten' : 'Perlu Perbaikan'}</td>
        <td>${isNaik ? 'Pertahankan prestasi di kelas berikutnya.' : 'Mohon diskusi dengan wali kelas.'}</td>
      </tr>`;
    }
    html += `</table>`;
    document.getElementById("hasil").innerHTML = html;
  };
  reader.readAsArrayBuffer(this.files[0]);
});

// Fungsi Download PDF (Dipertahankan)
function downloadPDF(){
  html2pdf().from(document.getElementById("pdfArea")).set({
    filename: "Laporan_Kenaikan_Kelas.pdf",
    html2canvas: {scale: 1.6, useCORS: true},
    jsPDF: {format: "a4", orientation: "landscape"},
    pagebreak: {mode: ["avoid-all", "css", "legacy"]}
  }).save();
}
</script>

</body>
</html>
